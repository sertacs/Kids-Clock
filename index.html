<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="application-name" content="Kids Clock">
    <meta name="msapplication-navbutton-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Kids Clock</title>
    <link rel="stylesheet" href="css/style.css?1">
    <link rel="stylesheet" href="css/time-gradients.css">
</head>
<body>
    <main class="app-shell">
        <div class="period-switch">
        <button class="period-btn am active" data-period="am">
            <span class="period-label">AM</span>
            <div class="editing-indicator">
                <svg class="edit-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                </svg>
            </div>
        </button>
        <button class="period-btn pm" data-period="pm">
            <span class="period-label">PM</span>
            <div class="editing-indicator">
                <svg class="edit-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                </svg>
            </div>
        </button>
        </div>

        <div class="clock-container">
        <!-- Clock Markers with Drop Zones -->
        <div class="clock-markers">
            <div class="marker marker-12" data-hour="12">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-1" data-hour="1">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-2" data-hour="2">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-3" data-hour="3">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-4" data-hour="4">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-5" data-hour="5">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-6" data-hour="6">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-7" data-hour="7">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-8" data-hour="8">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-9" data-hour="9">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-10" data-hour="10">
                <div class="drop-zone"></div>
            </div>
            <div class="marker marker-11" data-hour="11">
                <div class="drop-zone"></div>
            </div>
        </div>

        <div class="clock-face"></div>
        <div class="clock-hands">
            <div class="hand-hour"></div>
            <div class="hand-minute"></div>
            <div class="hand-second"></div>
            <div class="clock-center"></div>
        </div>
        </div>

        <div class="icon-toolbar">
        <button class="icon-btn" draggable="true" data-activity="sleep">
            <img src="images/sleep.png" alt="Sleep">
            <span>Sleep</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="eat">
            <img src="images/eat.png" alt="Meal">
            <span>Meal</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="brush">
            <img src="images/brush.png" alt="Brush">
            <span>Brush</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="play">
            <img src="images/play.png" alt="Play">
            <span>Play</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="cartoon">
            <img src="images/cartoon.png" alt="Cartoon">
            <span>Cartoon</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="sport">
            <img src="images/sport.png" alt="Sport">
            <span>Sport</span>
        </button>
        <button class="icon-btn" draggable="true" data-activity="homework">
            <img src="images/homework.png" alt="Homework">
            <span>Homework</span>
        </button>
        </div>

    </main>
    <script src="js/main.js"></script>
</body>
</html>
